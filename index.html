<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KPI Dashboard - Le Cercle MDB</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, Arial, sans-serif; }
    body { margin: 0; min-height: 100vh; background: #101223; color: #F8FAFC; }
    main { max-width: 920px; margin: 0 auto; padding: 34px 24px; }
    h1 { margin: 0 0 8px; font-size: 30px; }
    p { margin: 0 0 24px; color: #A7ADC3; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 14px; }
    .card { display: flex; flex-direction: column; gap: 10px; padding: 18px; border: 1px solid #252A48; border-radius: 8px; background: #151832; color: #F8FAFC; text-decoration: none; }
    .card:hover { border-color: #C9A24A; }
    span { font-size: 18px; font-weight: 750; }
    small { color: #C9A24A; }
  </style>
</head>
<body>
  <main>
    <h1>KPI Dashboard</h1>
    <p>Pages statiques pretes pour publication GitHub Pages et integration HubSpot.</p>
    <div class="grid">
      <a class="card" href="newsletter-sent.html"><span>Newsletters envoyees</span><small>52 point(s)</small></a>
<a class="card" href="newsletter-subscribers.html"><span>Abonnes newsletter</span><small>1 point(s)</small></a>
<a class="card" href="newsletter-open-rate.html"><span>Taux d'ouverture newsletter</span><small>52 point(s)</small></a>
<a class="card" href="website-visits.html"><span>Visites site web</span><small>52 point(s)</small></a>
    </div>
  </main>
</body>
</html>
